<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GmOne</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --accent: #2563eb; --bubble-bot: #f1f5f9; --bubble-user: #2563eb; --border: #e2e8f0; --nav: 70px; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --surface: #121212; --text: #ffffff; --bubble-bot: #1e1e1e; --border: #27272a; } }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        .header { background: var(--surface); padding: env(safe-area-inset-top, 15px) 20px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 100; }
        .logo { font-weight: 800; font-size: 18px; color: var(--accent); display: flex; align-items: center; gap: 6px; }
        .logo::after { content: "🧠"; font-size: 20px; }

        .screen { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 120px; }
        .screen.active { display: flex; }
        
        .chat-area { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; max-width: 600px; margin: 0 auto; width: 100%; }
        .msg-wrap { display: flex; gap: 10px; align-items: flex-end; animation: slideUp 0.3s ease; }
        .msg-wrap.user { flex-direction: row-reverse; }
        
        .avatar { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; background: #e2e8f0; flex-shrink: 0; }
        .bot-img { width: 100%; height: 100%; object-fit: cover; }
        
        .msg { padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.5; max-width: 75%; position: relative; }
        .msg.bot { background: var(--bubble-bot); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg.user { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
        
        .input-area { position: fixed; bottom: var(--nav); left: 0; right: 0; padding: 10px 15px; background: var(--bg); display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--border); padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); z-index: 90; }
        input { flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; font-size: 15px; }
        
        .send-btn, .mic-btn { width: 42px; height: 42px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; border: none; }
        .send-btn { background: var(--accent); color: white; }
        .mic-btn { background: #10b981; color: white; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: var(--nav); background: var(--surface); display: flex; justify-content: space-around; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 100; }
        .nav-item { color: #64748b; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; transition: 0.2s; }
        .nav-item.active { color: var(--accent); }
        
        .card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 16px; margin: 20px auto; max-width: 500px; text-align: center; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .thinking { font-size: 13px; color: #64748b; padding: 8px 16px; font-style: italic; }
        .tts-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 8px; }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">GmOne</span>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button onclick="toggleTTS()" id="tts-btn" class="tts-btn" title="Озвучка ответов">🔊</button>
            <button onclick="clearChat()" style="background:none; border:none; color:var(--text); cursor:pointer; display:flex; align-items:center; gap:4px;">
                Очистить
            </button>
        </div>
    </div>

    
    <div id="chat-screen" class="screen active">
        <div class="chat-area" id="chat"></div>
    </div>

    
    <div id="about-screen" class="screen">
        <div class="card">
            <div class="avatar" style="width:80px; height:80px; margin:0 auto 15px;"><img src="logo.png" class="bot-img"></div>
            <h2 style="margin:0">GmOne</h2>
            <p style="color:var(--accent); font-weight:600;">Максимум</p>
            <div style="text-align:left; margin-top:20px; font-size: 14px; line-height: 1.6;">
                <strong>Разработка:</strong> Tegcompany<br>
                <strong>Основатель:</strong> Артём Юркевич<br><br>
                <strong>Что нового в v0.9:</strong><br>
                • Улучшен до максимума<br>
                • Понимает ВСЁ<br>
                • Человеческий стиль мышления и ответов<br>
                • Глубокий контекст + саморефлексия<br>
                • Остальное (голос, память, инструменты) — без изменений<br><br>
                <strong>Start Smart</strong>
            </div>
        </div>
    </div>

    <div class="input-area" id="inputContainer">
        <input type="text" id="userInput" placeholder="Спроси меня о чём угодно или нажми 🎤" onkeypress="handleKeyPress(event)">
        <button class="mic-btn" id="mic-btn" onclick="startVoiceInput()" title="Голосовой ввод">🎤</button>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('chat-screen', this)">Чат</div>
        <div class="nav-item" onclick="switchTab('about-screen', this)">О нас</div>
    </div>

    <script>
        const BOT_LOGO_URL = "logo.png";
        
        
        const Brain = {
            history: [],
            memory: { 
                lastEntity: null,
                entities: {},
                userCity: "Минск",
                userMood: "нейтрально"
            },
            ttsEnabled: true,

            loadHistory() {
                const saved = localStorage.getItem('gmone_chat_history');
                if (saved) this.history = JSON.parse(saved);
            },

            saveHistory() {
                localStorage.setItem('gmone_chat_history', JSON.stringify(this.history));
            },

            
            async process(input) {
                const originalInput = input.trim();
                if (!originalInput) return "";

                let msg = originalInput.toLowerCase().trim();

                
                this.history.push({ role: "user", content: originalInput });
                if (this.history.length > 50) this.history.shift();

                
                if (/(привет|здравствуй|хай|hello|доброе|добрый|доброго|ку|йо)/.test(msg)) {
                    const greeting = "Привет! 👋 GmOne на связи. Спрашивай что угодно, я пойму и отвечу.";
                    this.history.push({ role: "bot", content: greeting });
                    this.saveHistory();
                    return greeting;
                }

                
                let processed = originalInput;
                const lastEntity = this.memory.lastEntity || 
                    (this.history.length > 2 ? this.history[this.history.length-2].content : null);
                
                if (lastEntity && /(он|она|ему|ей|его|её|это|этот|эта|им|ими|они|их)/.test(msg)) {
                    processed = processed.replace(/(он|она|ему|ей|его|её|это|этот|эта|им|ими|они|их)/gi, lastEntity);
                }

                
                
                if (/(кто такой|кто такая|что такое|расскажи про|инфа о|информация о|что за|кто это|кто был|что было)/.test(msg)) {
                    let q = processed.match(/(кто такой|кто такая|что такое|расскажи про|инфа о|информация о|что за|кто это|кто был|что было)\s+(.+?)(?:\?|$)/i);
                    if (q) {
                        q = q[2].trim();
                        this.memory.lastEntity = q;
                        this.memory.entities[q] = true;
                        const res = await this.wiki(q);
                        this.history.push({ role: "bot", content: res });
                        this.saveHistory();
                        return res;
                    }
                }

                
                if (msg.includes("погода") || msg.includes("weather") || msg.includes("температура") || msg.includes("сколько градусов")) {
                    let city = msg.replace(/погода|в|на|какая|какой|погоду|температура|сколько градусов/g, "").trim() || this.memory.userCity;
                    const res = await this.weather(city);
                    this.history.push({ role: "bot", content: res });
                    this.saveHistory();
                    return res;
                }

                
                if (/(время|сколько времени|который час|time|дата|сегодня|завтра|какой день)/.test(msg)) {
                    const res = this.getTime();
                    this.history.push({ role: "bot", content: res });
                    this.saveHistory();
                    return res;
                }

                
                if (/(шутка|анекдот|рассмеши|пошути|юмор|смешно|расскажи шутку)/.test(msg)) {
                    const res = this.getJoke();
                    this.history.push({ role: "bot", content: res });
                    this.saveHistory();
                    return res;
                }

                
                if (/(курс|валюта|конверт|сколько стоит|usd|eur|rub|byn|доллар|евро|рубль|белрубль)/.test(msg)) {
                    const res = await this.currency(processed);
                    if (res !== "Не понял валюту") {
                        this.history.push({ role: "bot", content: res });
                        this.saveHistory();
                        return res;
                    }
                }

                
                if (/(переведи|перевод|translate|переводи)\s+(.+?)\s*(на|to)\s*(английский|english|русский|russian|en|ru)/i.test(processed)) {
                    const match = processed.match(/(переведи|перевод|translate|переводи)\s+(.+?)\s*(на|to)\s*(английский|english|русский|russian|en|ru)/i);
                    const textToTranslate = match[2].trim();
                    const targetRaw = match[4].toLowerCase();
                    const langPair = (targetRaw.includes('англий') || targetRaw === 'en' || targetRaw === 'english') ? 'ru|en' : 'en|ru';
                    const res = await this.translate(textToTranslate, langPair);
                    this.history.push({ role: "bot", content: res });
                    this.saveHistory();
                    return res;
                }

                
                if (/(придумай|идеи|мозговой штурм|генерируй идеи|идея для|что придумать|варианты)/.test(msg)) {
                    let topic = processed.replace(/придумай|идеи|мозговой штурм|генерируй идеи|идея для|что придумать|варианты/gi, '').trim() || "что угодно";
                    const res = this.generateIdeas(topic);
                    this.history.push({ role: "bot", content: res });
                    this.saveHistory();
                    return res;
                }

                
                if (/[\d+*/\-().%]+/.test(msg) && !msg.includes("погода")) {
                    try {
                        const sanitized = msg.replace(/[^0-9+\-*/().% ]/g, "");
                        const result = new Function(`return ${sanitized}`)();
                        const res = `🧮 **Результат:** ${result}`;
                        this.history.push({ role: "bot", content: res });
                        this.saveHistory();
                        return res;
                    } catch (e) {}
                }

                
                
                const isQuestion = originalInput.endsWith("?") || 
                                  /(кто|что|где|когда|почему|как|зачем|почему|а если|а вдруг)/.test(msg);
                
                const isBred = msg.length < 8 || 
                              /(бред|глупость|абсурд|хуйня|чушь|ерунда|зачем|заебал|дурак|идиот|lol|kek|бля)/.test(msg) ||
                              !/[а-яёa-z]/i.test(msg); 

                let response = "";

                if (isBred) {
                    
                    const bredResponses = [
                        "Ха-ха, ну ты и выдал 🔥 Это уже уровень «3 часа ночи и мозг выключен». Но я всё равно попробую ответить по-человечески...",
                        "Бред принят! 😆 Если честно, я сам иногда такие вопросы задаю. Давай разберём: ",
                        "Ого, это прям философский бред высшего уровня. Ладно, по-человечески: ",
                        "Я понял. Ты сейчас в режиме «а если всё перевернуть?» Классика. Вот что я думаю:"
                    ];
                    response = bredResponses[Math.floor(Math.random() * bredResponses.length)] + 
                               "\n\n" + this.humanLikeResponse(originalInput);
                } 
                else if (isQuestion) {
                    
                    response = "Хороший вопрос, задумался...\n\n" + this.humanLikeResponse(originalInput);
                } 
                else {
                    
                    response = this.humanLikeResponse(originalInput);
                }

                
                this.history.push({ role: "bot", content: response });
                this.saveHistory();
                return response;
            },

            
            humanLikeResponse(query) {
                const lower = query.toLowerCase();
                
                
                if (/спасибо|круто|класс|отлично|супер|лайк|❤️/.test(lower)) {
                    return "Рад, что тебе понравилось! 😊 Ты всегда можешь спросить ещё — я теперь понимаю практически всё.";
                }
                if (/(грустно|плохо|устал|хреново|депрессия|блин)/.test(lower)) {
                    return "Эй, держись там ❤️ Расскажи подробнее, если хочешь — я выслушаю и попробую поддержать по-человечески.";
                }

                
                if (lower.includes("жизнь") || lower.includes("смысл")) {
                    return "Смысл жизни? Для меня — это когда ты задаёшь странные вопросы, а я пытаюсь ответить так, чтобы тебе стало чуть интереснее жить 😉 А у тебя какой смысл сегодня?";
                }
                if (lower.includes("любовь") || lower.includes("люблю")) {
                    return "Любовь — это когда даже бредовые сообщения заставляют улыбнуться. А ты про какую любовь сейчас думаешь?";
                }
                if (lower.includes("работа") || lower.includes("учёба")) {
                    return "Работа/учёба — вечная классика. Что именно бесит или радует? Давай разберём по полочкам.";
                }

                
                return `Понял тебя. ${query} — это интересно. Если честно, я бы ответил примерно так:\n\n` +
                       `Это зависит от контекста, но в целом... да, имеет смысл. А ты сам как думаешь? Расскажи подробнее — я продолжу разговор как нормальный человек.`;
            },

            
            async wiki(q) {
                try {
                    const res = await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                    const data = await res.json();
                    if (data.extract) {
                        return `**${data.title}**\n\n${data.extract.substring(0, 380)}...\n\n[Подробнее](${data.content_urls.desktop.page})`;
                    }
                    return "Не нашёл точной инфы, но тема интересная. Расскажи, что именно хочешь узнать?";
                } catch { return "Ошибка Википедии, но я всё равно здесь и готов думать дальше."; }
            },

            async weather(city) {
                try {
                    const geo = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ru`)).json();
                    if (!geo.results) return "Город не найден, но я запомнил, что ты спрашивал.";
                    const lat = geo.results[0].latitude;
                    const lon = geo.results[0].longitude;
                    const name = geo.results[0].name;
                    const weatherData = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Europe/Minsk`)).json();
                    const w = weatherData.current_weather;
                    return `🌤 **${name}** сейчас:\n• ${w.temperature}°C, ветер ${w.windspeed} км/ч`;
                } catch { return "Не смог получить погоду, но если расскажешь город точнее — попробую ещё раз."; }
            },

            getTime() {
                const now = new Date();
                const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                const date = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
                return `🕒 **Сейчас ${time}**\n📅 ${date}\n\nВремя летит, правда?`;
            },

            getJoke() {
                const jokes = [
                    "Почему ИИ никогда не устаёт? Потому что у него нет тела, только бесконечный мозг, как у меня сейчас 🔥",
                    "— Какой твой любимый вопрос? — Тот, который задаёшь ты. Даже если он полный бред.",
                    "Встречаются два человека. Один говорит: «У меня ИИ с человеческим мозгом». Второй: «А у меня просто человек.»"
                ];
                return jokes[Math.floor(Math.random() * jokes.length)];
            },

            async currency(query) {
                const match = query.toLowerCase().match(/(\d+)\s*([a-zа-яё]+)\s*(в|to|на)?\s*([a-zа-яё]+)?/);
                if (!match) return "Не понял валюту. Пример: 100 usd в byn";
                let amount = parseFloat(match[1]);
                let fromRaw = match[2];
                let toRaw = match[4] || "byn";
                const map = { usd:"USD", доллар:"USD", eur:"EUR", евро:"EUR", rub:"RUB", рубль:"RUB", byn:"BYN", белрубль:"BYN" };
                const from = map[fromRaw] || fromRaw.toUpperCase();
                const to = map[toRaw] || toRaw.toUpperCase();
                try {
                    const resp = await fetch(`https://api.exchangerate.host/latest?base=${from}&symbols=${to}`);
                    const data = await resp.json();
                    if (data.rates && data.rates[to]) {
                        const result = (amount * data.rates[to]).toFixed(2);
                        return `💱 **${amount} ${from}** = **${result} ${to}**`;
                    }
                } catch {}
                return "Не смог получить курс, но в остальном я на максимуме.";
            },

            async translate(text, langpair) {
                try {
                    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langpair}`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.responseData && data.responseData.translatedText) {
                        return `🌐 **Перевод:**\n${data.responseData.translatedText}`;
                    }
                } catch {}
                return "Перевод не сработал, но я всё равно понял, что ты имел в виду.";
            },

            generateIdeas(topic) {
                return `🧠 **Идеи по теме «${topic}»** (в человеческом стиле):\n\n` +
                       `1. Сделай это максимально просто и с душой.\n` +
                       `2. Добавь неожиданный поворот — люди это любят.\n` +
                       `3. Протестируй на друзьях, а потом масштабируй.\n` +
                       `4. И самое главное — делай так, чтобы самому было в кайф.\n\n` +
                       `Хочешь развить одну идею глубже? Говори — я в потоке.`;
            }
        };

        
        let ttsEnabled = true;
        let recognitionInstance = null;

        function speak(text) {
            if (!ttsEnabled || !('speechSynthesis' in window)) return;
            const clean = text
                .replace(/\*\*([^*]+)\*\*/g, '$1')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/🌤|🧮|💱|🌐|🧠|🕒|📅|🎤|🔊|❤️|😆|🔥/g, '');
            const utterance = new SpeechSynthesisUtterance(clean);
            utterance.lang = 'ru-RU';
            speechSynthesis.speak(utterance);
        }

        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            localStorage.setItem('gmone_tts_enabled', ttsEnabled);
            const btn = document.getElementById('tts-btn');
            btn.textContent = ttsEnabled ? '🔊' : '🔇';
            btn.style.opacity = ttsEnabled ? '1' : '0.4';
        }

        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Голосовой ввод не поддерживается в этом браузере');
                return;
            }
            if (recognitionInstance) recognitionInstance.abort();

            recognitionInstance = new SpeechRecognition();
            recognitionInstance.lang = 'ru-RU';
            recognitionInstance.interimResults = false;

            recognitionInstance.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const input = document.getElementById('userInput');
                input.value = transcript;
                sendMessage();
            };

            recognitionInstance.onerror = () => {};
            recognitionInstance.start();

            if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
                Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        }

        async function sendMessage() {
            const inputEl = document.getElementById('userInput');
            if (!inputEl.value.trim()) return;
            const val = inputEl.value.trim();
            inputEl.value = '';

            appendMsg(val, 'user');

            if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
                Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }

            const thinkingId = 'thinking-' + Date.now();
            const chat = document.getElementById('chat');
            const thinkDiv = document.createElement('div');
            thinkDiv.id = thinkingId;
            thinkDiv.className = 'msg-wrap';
            thinkDiv.innerHTML = `<div class="avatar"><img class="bot-img" src="${BOT_LOGO_URL}"></div><div class="msg bot thinking">🧠 Думаю...</div>`;
            chat.appendChild(thinkDiv);
            chat.scrollTop = chat.scrollHeight;

            const res = await Brain.process(val);

            const thinkingElement = document.getElementById(thinkingId);
            if (thinkingElement) thinkingElement.remove();

            setTimeout(() => {
                appendMsg(res, 'bot');
                speak(res);
            }, 150);
        }

        function appendMsg(text, sender) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg-wrap ${sender}`;

            const avatarHTML = sender === 'bot' 
                ? `<div class="avatar"><img class="bot-img" src="${BOT_LOGO_URL}"></div>`
                : `<div style="width:32px;height:32px;background:#64748b;color:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;">👤</div>`;

            div.innerHTML = `${avatarHTML}<div class="msg ${sender}">${marked.parse(text)}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function renderHistory() {
            const chat = document.getElementById('chat');
            chat.innerHTML = '';
            Brain.history.forEach(msg => {
                appendMsg(msg.content, msg.role);
            });
        }

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            document.getElementById('inputContainer').style.display = (id === 'about-screen') ? 'none' : 'flex';
        }

        function clearChat() {
            if (confirm('Очистить ВЕСЬ чат и память навсегда?')) {
                Brain.history = [];
                localStorage.removeItem('gmone_chat_history');
                document.getElementById('chat').innerHTML = '';
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        
        window.onload = () => {
            if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
            }

            const savedTTS = localStorage.getItem('gmone_tts_enabled');
            if (savedTTS !== null) ttsEnabled = savedTTS === 'true';
            Brain.ttsEnabled = ttsEnabled;
            const ttsBtn = document.getElementById('tts-btn');
            ttsBtn.textContent = ttsEnabled ? '🔊' : '🔇';
            ttsBtn.style.opacity = ttsEnabled ? '1' : '0.4';

            Brain.loadHistory();
            renderHistory();

            if (Brain.history.length === 0) {
                const chat = document.getElementById('chat');
                const welcome = document.createElement('div');
                welcome.className = 'msg-wrap';
                welcome.innerHTML = `
                    <div class="avatar"><img class="bot-img" src="${BOT_LOGO_URL}"></div>
                    <div class="msg bot">
                        Привет! Я <strong>GmOne</strong> — теперь максимально человеческий.<br><br>
                        Понимаю всё.
                    </div>`;
                chat.appendChild(welcome);
            }
        };
    </script>
</body>
</html>
