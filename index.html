<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GmOne</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #f7f7f9; --surface: #ffffff; --text: #000000; --accent: #007aff; --secondary: #8e8e93; --border: rgba(0,0,0,0.1); --nav: 70px; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --surface: #121212; --text: #ffffff; --secondary: #98989d; --border: rgba(255,255,255,0.1); } }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .header { background: color-mix(in srgb, var(--surface) 80%, transparent); backdrop-filter: blur(20px); padding: env(safe-area-inset-top, 20px) 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .screen { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: flex; }
        .chat-area { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Сообщения */
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 16px; line-height: 1.5; position: relative; }
        .msg.bot { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        
        /* Элементы */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: var(--nav-height); background: var(--surface); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom, 0px); }
        .nav-item { color: var(--secondary); font-size: 12px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .input-area { position: fixed; bottom: 80px; left: 0; right: 0; padding: 10px 20px; background: linear-gradient(to top, var(--bg) 90%, transparent); display: flex; gap: 10px; }
        input { flex: 1; padding: 14px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; }
        
        /* Карточки */
        .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin: 10px; }
        .logo-box { width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 15px; overflow: hidden; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight: 800; font-size: 20px;">GmOne</span>
        <button onclick="clearChat()" style="background:none; border:none; color:var(--secondary); font-size: 20px;">🗑</button>
    </div>

    <div id="chat-screen" class="screen active">
        <div class="chat-area" id="chat"></div>
    </div>

    <div id="about-screen" class="screen">
        <div class="card" style="text-align: center; margin-top: 20px;">
            <div class="logo-box"><img src="logo.png" style="width:100%; height:100%; object-fit:cover;"></div>
            <h2>GmOne AI</h2>
            <p>Версия 0.5</p>
            <div style="background:var(--accent); color:white; padding:10px; border-radius:15px; margin-top:20px;">
                Разработано Tegcompany<br>Основатель: Юркевич Артём Игоревич
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Спроси меня..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" style="background:var(--accent); color:white; border:none; width:45px; height:45px; border-radius:50%;">➤</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showScreen('chat-screen', this)">Чат</div>
        <div class="nav-item" onclick="showScreen('about-screen', this)">О нас</div>
    </div>

    <script>
        // --- КОГНИТИВНОЕ ЯДРО ---
        const GmOneMind = {
            state: { lastSubject: null },
            
            responses: {
                hello: ["Привет! Я готов к работе. Что тебя занимает?", "Здравствуй. О чем хочешь поговорить?", "Привет! GmOne на связи."],
                emotions: ["Я всего лишь код, но приятно это слышать!", "Спасибо, я стараюсь быть полезным."],
                fallback: ["Интересная мысль. Расскажи подробнее, чтобы я лучше понял контекст.", "Я анализирую это... Можешь пояснить, что именно ты имеешь в виду?", "Хм, мне нужно больше данных для точного ответа."]
            },

            async analyze(input) {
                let msg = input.toLowerCase().trim();

                // 1. Приветствия
                if (/^(привет|старт|хай|здравствуй)/.test(msg)) return this.responses.hello[0];

                // 2. Местоимения (Анализ контекста)
                if (/(он|она|ему|ней|его|её)/.test(msg) && this.state.lastSubject) {
                    msg = msg.replace(/(он|она|ему|ней|его|её)/g, this.state.lastSubject);
                }

                // 3. Сущности (Википедия)
                if (/(кто|что|про)\s+(.+)/.test(msg)) {
                    let match = msg.match(/(кто|что|про)\s+(.+)/)[2];
                    let data = await this.fetchWiki(match);
                    if (data) {
                        this.state.lastSubject = match; // Запоминаем контекст
                        return data;
                    }
                }

                // 4. Погода
                if (msg.includes("погода")) {
                    let city = msg.split("погода").pop().trim() || "Москва";
                    return await this.fetchWeather(city);
                }

                return this.responses.fallback[Math.floor(Math.random() * 3)];
            },

            async fetchWiki(q) {
                try {
                    let d = await (await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`)).json();
                    return d.extract ? `📚 **${d.title}**\n${d.extract}` : null;
                } catch { return null; }
            },

            async fetchWeather(c) {
                try {
                    let g = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${c}&count=1`)).json();
                    let w = (await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.results[0].latitude}&longitude=${g.results[0].longitude}&current_weather=true`)).json()).current_weather;
                    return `🌤 В **${g.results[0].name}**: ${w.temperature}°C, ветер ${w.windspeed} км/ч.`;
                } catch { return "Не удалось найти погоду."; }
            }
        };

        // --- ИНТЕРФЕЙС ---
        async function sendMessage() {
            let input = document.getElementById('userInput');
            if(!input.value) return;
            let val = input.value;
            input.value = '';
            
            appendMsg(val, 'user');
            
            let response = await GmOneMind.analyze(val);
            appendMsg(response, 'bot');
        }

        function appendMsg(text, sender) {
            let chat = document.getElementById('chat');
            let div = document.createElement('div');
            div.className = `message-wrapper ${sender}`;
            div.innerHTML = `<div class="avatar"><img class="bot-img" src="logo.png"></div><div class="msg ${sender}">${marked.parse(text)}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function clearChat() { localStorage.clear(); location.reload(); }
        function handleKeyPress(e) { if(e.key==='Enter') sendMessage(); }
    </script>
</body>
</html>
