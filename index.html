<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GmOne AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg-color: #f7f7f9; --secondary-bg: #ffffff; --text-color: #000000; --hint-color: #8e8e93; --button-color: #007aff; --button-text: #ffffff; --border-color: rgba(0, 0, 0, 0.06); --nav-height: 80px; }
        @media (prefers-color-scheme: dark) { :root { --bg-color: #000000; --secondary-bg: #151515; --text-color: #ffffff; --hint-color: #98989d; --border-color: rgba(255, 255, 255, 0.08); } }
        body { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .header { background: color-mix(in srgb, var(--secondary-bg) 85%, transparent); backdrop-filter: blur(10px); padding: env(safe-area-inset-top, 15px) 20px 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
        .screen { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 120px; }
        .screen.active { display: flex; }
        .chat-area { flex: 1; padding: 20px 15px; display: flex; flex-direction: column; gap: 16px; }
        .message-wrapper { display: flex; gap: 12px; opacity: 0; animation: slideUp 0.3s forwards; }
        .message-wrapper.user { flex-direction: row-reverse; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .avatar { width: 34px; height: 34px; border-radius: 10px; overflow: hidden; background: var(--secondary-bg); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 1px solid var(--border-color); }
        .bot-img { width: 100%; height: 100%; object-fit: cover; }
        .message { max-width: 82%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .message.bot { background: var(--secondary-bg); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        .message.user { background: var(--button-color); color: var(--button-text); border-bottom-right-radius: 4px; }
        .input-container { position: fixed; bottom: env(safe-area-inset-bottom, 0px); left: 0; right: 0; padding: 10px 15px; background: var(--bg-color); display: flex; gap: 10px; z-index: 40; }
        .input-box { flex: 1; display: flex; background: var(--secondary-bg); border-radius: 24px; padding: 4px 18px; border: 1px solid var(--border-color); align-items: center; }
        input { flex: 1; border: none; background: transparent; color: var(--text-color); font-size: 16px; padding: 12px 0; outline: none; }
        .send-btn { background: var(--button-color); color: #fff; border: none; border-radius: 50%; width: 38px; height: 38px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <span class="header-title">GmOne AI</span>
        <button class="clear-btn" onclick="clearChat()">🗑</button>
    </div>

    <div id="screen-chat" class="screen active">
        <div class="chat-area" id="chat"></div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Сообщение..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const BOT_LOGO_URL = "logo.png";
        
        // --- ПРОДВИНУТЫЙ МОЗГ ---
        const Brain = {
            memory: { lastEntity: null, lastTopic: null },

            // Классификатор ответов
            responses: {
                greeting: ["Привет! Я GmOne. Твой личный ИИ. Что обсудим?", "Привет! Рад тебя видеть. Есть идеи?", "Привет-привет! Готов к приключениям!"],
                mood: ["У меня все отлично, я же цифровой разум! А у тебя как?", "Работаю в штатном режиме, спасибо!", "Готов к обработке твоих задач."],
                unknown: ["Это интересная тема. Расскажи подробнее, я хочу разобраться.", "Не совсем уверен, что понял. Давай переформулируем?", "Звучит сложно, но я постараюсь понять. Поясни мысль?"]
            },

            async process(input) {
                let msg = input.toLowerCase().trim();

                // 1. ПРИВЕТСТВИЯ И ЭМОЦИИ
                if (/(привет|старт|хай|здравствуй)/.test(msg)) return this.responses.greeting[Math.floor(Math.random()*3)];
                if (/(как дела|как ты|ты как)/.test(msg)) return this.responses.mood[Math.floor(Math.random()*3)];

                // 2. АНАЛИЗАТОР КОНТЕКСТА (Местоимения)
                // Если пользователь говорит "он", "она", "оно" - подставляем lastEntity
                if (/(он|она|они|его|её)/.test(msg) && this.memory.lastEntity) {
                    msg = msg.replace(/(он|она|они|его|её)/g, this.memory.lastEntity);
                }

                // 3. МАТЕМАТИКА
                if (/[\d+*/-]{3,}/.test(msg)) {
                    try { return "🧮 " + new Function('return ' + msg.replace(/[^0-9+\-*/().]/g, ''))(); } catch {}
                }

                // 4. ПОИСК СУЩНОСТЕЙ (Wiki)
                let entityMatch = msg.match(/(кто такой|что такое|расскажи про|инфо о|поясни)\s+(.+)/i);
                let query = entityMatch ? entityMatch[2] : (msg.length < 15 ? msg : null);

                if (query) {
                    this.memory.lastEntity = query; // Запоминаем для будущего "он/она"
                    let data = await this.wiki(query);
                    if (data) return data;
                }

                // 5. ПОГОДА
                if (msg.includes("погода")) {
                    let city = msg.split('погода').pop().trim() || "Москва";
                    return await this.weather(city);
                }

                // 6. НЕЙТРАЛЬНЫЙ ОТВЕТ (Если ничего не нашли)
                return this.responses.unknown[Math.floor(Math.random()*3)];
            },

            async wiki(q) {
                try {
                    let d = await (await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`)).json();
                    if (!d.extract) return null;
                    this.memory.lastTopic = d.title;
                    return `📚 **${d.title}**\n${d.extract.substring(0, 300)}...\n\n[Подробнее](${d.content_urls.desktop.page})`;
                } catch { return null; }
            },

            async weather(c) {
                try {
                    let geo = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${c}&count=1`)).json();
                    if (!geo.results) return "Город не найден.";
                    let w = (await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.results[0].latitude}&longitude=${geo.results[0].longitude}&current_weather=true`)).json()).current_weather;
                    return `🌤 В ${geo.results[0].name} сейчас ${w.temperature}°C, ветер ${w.windspeed} км/ч.`;
                } catch { return "Ошибка сети."; }
            }
        };

        // --- UI ---
        async function sendMessage() {
            let val = document.getElementById('userInput').value;
            if(!val) return;
            document.getElementById('userInput').value = '';
            appendMsg(val, 'user');
            
            // "Имитация мышления"
            setTimeout(async () => {
                let res = await Brain.process(val);
                appendMsg(res, 'bot');
            }, 600);
        }

        function appendMsg(text, sender) {
            let wrap = document.createElement('div');
            wrap.className = `message-wrapper ${sender}`;
            wrap.innerHTML = `<div class="avatar"><img class="bot-img" src="${BOT_LOGO_URL}" onerror="this.style.display='none'"></div><div class="message ${sender}">${marked.parse(text)}</div>`;
            document.getElementById('chat').appendChild(wrap);
            document.getElementById('chat').scrollTop = 10000;
        }

        function clearChat() { localStorage.clear(); location.reload(); }
        function handleKeyPress(e) { if(e.key==='Enter') sendMessage(); }
    </script>
</body>
</html>
