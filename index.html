<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GmOne</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --accent: #2563eb;
            --bubble-bot: #f1f5f9;
            --bubble-user: #2563eb;
            --border: #e2e8f0;
            --nav: 70px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --surface: #121212;
                --text: #f1f5f9;
                --bubble-bot: #1f1f1f;
                --border: #27272a;
            }
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--surface);
            padding: env(safe-area-inset-top, 12px) 16px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .screen.active { display: flex; }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 120px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 680px;
            margin: 0 auto;
            width: 100%;
        }

        .msg-wrap {
            display: flex;
            gap: 12px;
            animation: slideUp 0.35s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .msg-wrap.user { flex-direction: row-reverse; }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            background: #e2e8f0;
        }
        .bot-img { width: 100%; height: 100%; object-fit: cover; }

        .msg {
            padding: 13px 17px;
            border-radius: 18px;
            font-size: 15.2px;
            line-height: 1.48;
            max-width: 78%;
            position: relative;
        }
        .msg.bot {
            background: var(--bubble-bot);
            border: 1px solid var(--border);
            border-bottom-left-radius: 5px;
        }
        .msg.user {
            background: var(--bubble-user);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .input-area {
            position: fixed;
            bottom: var(--nav);
            left: 0; right: 0;
            padding: 12px 16px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: end;
            z-index: 90;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        }

        input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 16px;
            outline: none;
        }

        .btn {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .send-btn { background: var(--accent); color: white; }
        .mic-btn { background: #10b981; color: white; }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: var(--nav);
            background: var(--surface);
            display: flex;
            border-top: 1px solid var(--border);
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--accent); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            margin: 20px auto;
            max-width: 520px;
            text-align: center;
        }

        .thinking {
            font-style: italic;
            color: #64748b;
            padding: 10px 16px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">GmOne <span style="font-size:22px">🧠</span></div>
        <div style="display:flex; gap:12px; align-items:center;">
            <button id="tts-btn" class="btn" style="background:none; width:40px;height:40px;font-size:24px;" title="Озвучка">🔊</button>
            <button onclick="clearChat()" style="background:none;border:none;color:var(--text);font-size:14px;cursor:pointer;">
                Очистить
            </button>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen active">
        <div class="chat-area" id="chat"></div>
    </div>

    <!-- About Screen -->
    <div id="about-screen" class="screen">
        <div class="card">
            <div class="avatar" style="width:88px;height:88px;margin:0 auto 16px;">
                <img src="logo.png" class="bot-img" alt="GmOne">
            </div>
            <h2 style="margin:0 0 4px;">GmOne</h2>
            <p style="color:var(--accent);font-weight:600;margin:0 0 20px;">GmOne v1.0</p>
            <div style="text-align:left;font-size:14.5px;line-height:1.65;">
                <strong>Разработка:</strong> Tegcompany<br>
                <strong>Основатель:</strong> Артём Юркевич<br><br>
                <strong>Что нового:</strong><br>
                • Полностью переписан с нуля<br>
                • Современная архитектура<br>
                • Улучшенная память и контекст<br>
                • Лучшая обработка русского языка<br>
            </div>
        </div>
    </div>

    <div class="input-area" id="inputContainer">
        <input type="text" id="userInput" placeholder="Сообщение GmOne..." autocomplete="off">
        <button class="btn mic-btn" id="mic-btn" title="Голосовой ввод">🎤</button>
        <button class="btn send-btn" id="send-btn">➤</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" data-tab="chat-screen">Чат</div>
        <div class="nav-item" data-tab="about-screen">О нас</div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            MAX_HISTORY: 60,
            BOT_NAME: "GmOne",
            BOT_LOGO: "logo.png"
        };

        // ==================== SERVICES ====================
        const ApiService = {
            async wiki(query) {
                try {
                    const res = await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                    const data = await res.json();
                    return data.extract 
                        ? `**${data.title}**\n\n${data.extract.substring(0, 420)}...\n\n[Подробнее](${data.content_urls?.desktop?.page})`
                        : "Не нашёл точной статьи.";
                } catch { return "Не удалось связаться с Википедией."; }
            },

            async weather(city) {
                try {
                    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ru`);
                    const geo = await geoRes.json();
                    if (!geo.results?.[0]) return "Город не найден.";

                    const { latitude: lat, longitude: lon, name } = geo.results[0];
                    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const weather = await wRes.json();
                    const w = weather.current_weather;
                    return `🌤 **${name}**\n${w.temperature}°C • Ветер ${w.windspeed} км/ч`;
                } catch { return "Не удалось получить погоду."; }
            },

            async currency(amount, from, to) {
                try {
                    const res = await fetch(`https://api.exchangerate.host/latest?base=${from.toUpperCase()}&symbols=${to.toUpperCase()}`);
                    const data = await res.json();
                    if (data.rates?.[to.toUpperCase()]) {
                        const result = (amount * data.rates[to.toUpperCase()]).toFixed(2);
                        return `💱 **${amount} ${from.toUpperCase()} = ${result} ${to.toUpperCase()}**`;
                    }
                } catch {}
                return "Не удалось получить курс валют.";
            },

            async translate(text, targetLang) {
                try {
                    const langpair = targetLang === 'en' ? 'ru|en' : 'en|ru';
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langpair}`);
                    const data = await res.json();
                    return data.responseData?.translatedText || "Перевод не удался.";
                } catch { return "Ошибка перевода."; }
            }
        };

        // ==================== BRAIN ====================
        class GmOneBrain {
            constructor() {
                this.history = [];
                this.memory = {
                    lastEntity: null,
                    userCity: "Минск",
                    preferences: {}
                };
                this.ttsEnabled = true;
            }

            load() {
                const saved = localStorage.getItem('gmone_history');
                if (saved) this.history = JSON.parse(saved);
                
                const savedTTS = localStorage.getItem('gmone_tts');
                if (savedTTS !== null) this.ttsEnabled = savedTTS === 'true';
            }

            save() {
                localStorage.setItem('gmone_history', JSON.stringify(this.history.slice(-CONFIG.MAX_HISTORY)));
            }

            async process(input) {
                const original = input.trim();
                if (!original) return "";

                this.history.push({ role: "user", content: original });

                const lower = original.toLowerCase();

                // Специальные обработчики
                if (this.isGreeting(lower)) return this.getGreeting();
                if (this.isWeatherRequest(lower)) return await this.handleWeather(lower);
                if (this.isTimeRequest(lower)) return this.getTime();
                if (this.isJokeRequest(lower)) return this.getJoke();
                if (this.isCurrencyRequest(lower)) return await this.handleCurrency(original);
                if (this.isTranslateRequest(original)) return await this.handleTranslate(original);
                if (this.isEntityRequest(lower)) return await this.handleEntity(original);

                // Основной интеллектуальный ответ
                const response = this.generateHumanResponse(original, lower);
                this.history.push({ role: "bot", content: response });
                this.save();
                return response;
            }

            isGreeting(l) { return /(привет|здравствуй|хай|hello|добр|ку|йо)/.test(l); }
            isWeatherRequest(l) { return /погода|weather|температура|градус/.test(l); }
            isTimeRequest(l) { return /время|сколько времени|который час|дата|сегодня/.test(l); }
            isJokeRequest(l) { return /шутк|анекдот|пошути|рассмеши|юмор/.test(l); }
            isCurrencyRequest(l) { return /курс|валют|доллар|евро|руб|белруб|byn|usd|eur/.test(l); }
            isTranslateRequest(text) { return /(переведи|translate|перевод)/i.test(text); }
            isEntityRequest(l) { return /(кто такой|кто такая|что такое|расскажи про|инфа о)/.test(l); }

            getGreeting() {
                return "Привет! 👋 GmOne на связи. Спрашивай что угодно — я теперь умнее и человечнее.";
            }

            getTime() {
                const now = new Date();
                return `🕒 **${now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}**\n` +
                       `📅 ${now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'})}`;
            }

            getJoke() {
                const jokes = [
                    "Почему программисты путают Хеллоуин и Рождество? Потому что Oct 31 == Dec 25.",
                    "— GmOne, ты меня любишь? — Больше, чем вчера, но меньше, чем завтра."
                ];
                return jokes[Math.floor(Math.random() * jokes.length)];
            }

            async handleWeather(text) {
                const cityMatch = text.match(/в\s+([а-яёa-z\s-]+)/i);
                const city = cityMatch ? cityMatch[1].trim() : this.memory.userCity;
                return await ApiService.weather(city);
            }

            async handleCurrency(text) {
                const match = text.match(/(\d+)\s*([a-zа-яё]+)\s*(?:в|to|на)?\s*([a-zа-яё]+)/i);
                if (!match) return "Пример: 100 usd в byn";
                return await ApiService.currency(match[1], match[2], match[3] || "byn");
            }

            async handleTranslate(text) {
                const match = text.match(/(?:переведи|translate)\s+(.+?)\s+(?:на|to)\s+(английский|english|русский|russian|en|ru)/i);
                if (!match) return "Не понял запрос на перевод.";
                const target = match[2].toLowerCase().includes('англий') || match[2] === 'en' ? 'en' : 'ru';
                return await ApiService.translate(match[1], target);
            }

            async handleEntity(text) {
                const match = text.match(/(?:кто такой|кто такая|что такое|расскажи про)\s+(.+?)(?:\?|$)/i);
                if (!match) return "Что именно рассказать?";
                
                const entity = match[1].trim();
                this.memory.lastEntity = entity;
                return await ApiService.wiki(entity);
            }

            generateHumanResponse(query, lower) {
                if (/спасибо|круто|отлично|супер/.test(lower)) 
                    return "Рад, что зашёл! 😊 Всегда рад помочь.";
                
                if (/(грустно|плохо|устал|депрессия)/.test(lower))
                    return "Обнимаю ❤️ Расскажи, что происходит — я рядом.";

                return `Понял тебя. ${query} — интересная тема.\n\n` +
                       `Если честно, я бы подумал над этим так: контекст очень важен. А что именно тебя волнует в этом вопросе?`;
            }
        }

        // ==================== UI MANAGER ====================
        const UI = {
            chat: null,
            input: null,
            brain: null,

            init() {
                this.chat = document.getElementById('chat');
                this.input = document.getElementById('userInput');
                this.brain = new GmOneBrain();
                this.brain.load();

                this.setupEventListeners();
                this.renderHistory();
            },

            setupEventListeners() {
                document.getElementById('send-btn').addEventListener('click', () => this.sendMessage());
                this.input.addEventListener('keypress', e => e.key === 'Enter' && this.sendMessage());

                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', () => this.switchTab(item.dataset.tab, item));
                });

                document.getElementById('tts-btn').addEventListener('click', () => this.toggleTTS());
                document.getElementById('mic-btn').addEventListener('click', () => this.startVoiceInput());
            },

            async sendMessage() {
                const text = this.input.value.trim();
                if (!text) return;

                this.appendMessage(text, 'user');
                this.input.value = '';

                // Thinking indicator
                const thinkingId = 'think-' + Date.now();
                this.showThinking(thinkingId);

                const response = await this.brain.process(text);
                this.removeThinking(thinkingId);
                this.appendMessage(response, 'bot');
                this.speak(response);
            },

            appendMessage(text, role) {
                const div = document.createElement('div');
                div.className = `msg-wrap ${role}`;
                
                const avatar = role === 'bot' 
                    ? `<div class="avatar"><img class="bot-img" src="${CONFIG.BOT_LOGO}"></div>`
                    : `<div style="width:34px;height:34px;background:#64748b;color:white;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;">👤</div>`;

                div.innerHTML = `${avatar}<div class="msg ${role}">${marked.parse(text)}</div>`;
                this.chat.appendChild(div);
                this.chat.scrollTop = this.chat.scrollHeight;
            },

            showThinking(id) {
                const div = document.createElement('div');
                div.id = id;
                div.className = 'msg-wrap';
                div.innerHTML = `
                    <div class="avatar"><img class="bot-img" src="${CONFIG.BOT_LOGO}"></div>
                    <div class="msg bot thinking">🧠 Думаю...</div>
                `;
                this.chat.appendChild(div);
                this.chat.scrollTop = this.chat.scrollHeight;
            },

            removeThinking(id) {
                const el = document.getElementById(id);
                if (el) el.remove();
            },

            renderHistory() {
                this.chat.innerHTML = '';
                this.brain.history.forEach(msg => this.appendMessage(msg.content, msg.role));
            },

            switchTab(tabId, el) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                
                document.getElementById(tabId).classList.add('active');
                el.classList.add('active');
                
                document.getElementById('inputContainer').style.display = tabId === 'about-screen' ? 'none' : 'flex';
            },

            toggleTTS() {
                this.brain.ttsEnabled = !this.brain.ttsEnabled;
                localStorage.setItem('gmone_tts', this.brain.ttsEnabled);
                document.getElementById('tts-btn').textContent = this.brain.ttsEnabled ? '🔊' : '🔇';
            },

            speak(text) {
                if (!this.brain.ttsEnabled || !('speechSynthesis' in window)) return;
                
                const cleanText = text
                    .replace(/\*\*([^*]+)\*\*/g, '$1')
                    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                    .replace(/[\u{1F300}-\u{1F9FF}]/gu, '');

                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'ru-RU';
                speechSynthesis.speak(utterance);
            },

            startVoiceInput() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return alert('Голосовой ввод не поддерживается');

                const recognition = new SpeechRecognition();
                recognition.lang = 'ru-RU';
                recognition.interimResults = false;

                recognition.onresult = (e) => {
                    this.input.value = e.results[0][0].transcript;
                    this.sendMessage();
                };

                recognition.start();
            }
        };

        // ==================== INIT ====================
        window.onload = () => {
            if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
            }

            UI.init();

            // Welcome message
            if (UI.brain.history.length === 0) {
                setTimeout(() => {
                    UI.appendMessage("Привет! Я <strong>GmOne</strong> — твой умный помощник.\n\nStartSmart.", 'bot');
                }, 300);
            }
        };

        // Expose for inline handlers if needed
        window.clearChat = () => {
            if (confirm('Очистить весь чат навсегда?')) {
                UI.brain.history = [];
                localStorage.removeItem('gmone_history');
                UI.chat.innerHTML = '';
            }
        };
    </script>
</body>
</html>
