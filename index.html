<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GmOne</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #f7f7f9; --surface: #ffffff; --text: #000000; --accent: #007aff; --secondary: #8e8e93; --border: rgba(0,0,0,0.1); --nav: 70px; --input: 60px; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --surface: #121212; --text: #ffffff; --secondary: #98989d; --border: rgba(255,255,255,0.1); } }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        .header { background: color-mix(in srgb, var(--surface) 90%, transparent); backdrop-filter: blur(15px); padding: env(safe-area-inset-top, 15px) 20px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        #chat-screen { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; padding-bottom: calc(var(--nav-height) + var(--input-height, 80px) + 20px); }
        
        .msg-wrap { display: flex; gap: 10px; animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .msg-wrap.user { flex-direction: row-reverse; }
        .avatar { width: 32px; height: 32px; border-radius: 10px; overflow: hidden; background: var(--surface); flex-shrink: 0; border: 1px solid var(--border); }
        .bot-img { width: 100%; height: 100%; object-fit: cover; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .msg.bot { background: var(--surface); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg.user { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        
        .input-area { position: fixed; bottom: var(--nav-height); left: 0; right: 0; padding: 10px 15px; background: var(--bg); display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; font-size: 15px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: var(--nav-height); background: var(--surface); display: flex; justify-content: space-around; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom, 0px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--secondary); font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); font-weight: 600; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight: 800; font-size: 18px;">GmOne</span>
        <button onclick="clearChat()" style="background:none; border:none; color:var(--secondary);">🗑</button>
    </div>

    <div id="chat-screen" class="screen active">
        <div class="chat-area" id="chat"></div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Сообщение..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" style="background:var(--accent); color:white; border:none; width:40px; height:40px; border-radius:50%;">➤</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('chat', this)">Чат</div>
        <div class="nav-item" onclick="switchTab('skills', this)">Навыки</div>
    </div>

    <script>
        const BOT_LOGO_URL = "logo.png";
        
        // --- КОГНИТИВНОЕ ЯДРО (V6) ---
        const Brain = {
            memory: { lastEntity: null },
            
            async process(input) {
                let msg = input.toLowerCase().trim();
                
                // 1. Приветствия
                if (/^(привет|старт|хай)/.test(msg)) return "Привет! Чем я могу тебе помочь сегодня?";
                
                // 2. Эмоциональный контекст
                if (/(скучно|делать)/.test(msg)) return "Можем сыграть в слова, решить задачу или просто поболтать. О чем хочешь?";
                
                // 3. Местоимения (Анализ контекста)
                if (/(он|она|ему|ней|его|её)/.test(msg) && this.memory.lastEntity) {
                    msg = msg.replace(/(он|она|ему|ней|его|её)/g, this.memory.lastEntity);
                }

                // 4. Поиск (Википедия)
                if (/(кто такой|что такое|расскажи про|инфо о)\s+(.+)/.test(msg)) {
                    let q = msg.match(/(кто такой|что такое|расскажи про|инфо о)\s+(.+)/)[2];
                    this.memory.lastEntity = q;
                    let data = await this.wiki(q);
                    return data || "Интересно, но я не нашел информации об этом.";
                }

                // 5. Погода/Крипта
                if (msg.includes("погода")) return await this.weather(msg.split("погода").pop().trim() || "Москва");
                if (msg.includes("курс") || msg.includes("крипта")) return await this.crypto();

                // 6. Математика
                if (/[\d+*/-]{3,}/.test(msg)) {
                    try { return "Результат: " + eval(msg.replace(/[^0-9+\-*/().]/g, '')); } catch { return "Ошибка вычисления."; }
                }

                return "Я понимаю, что ты хочешь узнать больше. Спроси меня про погоду, курс крипты или напиши термин, который тебя интересует!";
            },

            async wiki(q) {
                try {
                    let d = await (await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`)).json();
                    return d.extract ? `**${d.title}**\n\n${d.extract.substring(0, 300)}...` : null;
                } catch { return null; }
            },

            async weather(c) {
                try {
                    let g = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${c}&count=1`)).json();
                    let w = (await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.results[0].latitude}&longitude=${g.results[0].longitude}&current_weather=true`)).json()).current_weather;
                    return `🌤 В **${g.results[0].name}** сейчас ${w.temperature}°C, ветер ${w.windspeed} км/ч.`;
                } catch { return "Город не найден."; }
            },

            async crypto() {
                try {
                    let d = await (await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd')).json();
                    return `📈 BTC: $${d.bitcoin.usd} | ETH: $${d.ethereum.usd}`;
                } catch { return "Ошибка API."; }
            }
        };

        // --- UI ---
        async function sendMessage() {
            let input = document.getElementById('userInput');
            if(!input.value) return;
            let val = input.value;
            input.value = '';
            
            appendMsg(val, 'user');
            
            let res = await Brain.process(val);
            appendMsg(res, 'bot');
        }

        function appendMsg(text, sender) {
            let chat = document.getElementById('chat');
            let div = document.createElement('div');
            div.className = `msg-wrap ${sender}`;
            div.innerHTML = `<div class="avatar"><img class="bot-img" src="${BOT_LOGO_URL}" onerror="this.style.display='none'"></div><div class="msg ${sender}">${marked.parse(text)}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id === 'chat' ? 'chat-screen' : 'about-screen').classList.add('active');
            el.classList.add('active');
        }

        function clearChat() { localStorage.clear(); location.reload(); }
        function handleKeyPress(e) { if(e.key==='Enter') sendMessage(); }
    </script>
</body>
</html>
