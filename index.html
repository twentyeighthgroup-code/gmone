<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GmOne</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --bg: #09090b; --surface: #18181b; --text: #ffffff; 
            --accent: #6366f1; --secondary: #71717a; --border: #27272a; 
            --radius: 16px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        .header { background: #09090b; padding: env(safe-area-inset-top, 20px) 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-text { font-weight: 800; font-size: 20px; letter-spacing: -1px; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .screen { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 120px; }
        .screen.active { display: flex; }
        
        .chat-area { padding: 20px; display: flex; flex-direction: column; gap: 24px; max-width: 700px; margin: 0 auto; width: 100%; }
        .msg-wrap { display: flex; gap: 12px; }
        .msg-wrap.user { flex-direction: row-reverse; }
        .avatar { width: 36px; height: 36px; border-radius: 12px; background: var(--surface); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
        .bot-img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
        
        .msg { padding: 16px 20px; border-radius: var(--radius); font-size: 16px; line-height: 1.6; max-width: 80%; }
        .msg.bot { background: var(--surface); border-top-left-radius: 4px; border: 1px solid var(--border); }
        .msg.user { background: var(--accent); color: white; border-top-right-radius: 4px; }
        
        .input-container { position: fixed; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(to top, var(--bg) 90%, transparent); display: flex; justify-content: center; }
        .input-box { width: 100%; max-width: 700px; display: flex; background: var(--surface); border-radius: 20px; padding: 6px; border: 1px solid var(--border); }
        input { flex: 1; border: none; background: transparent; color: white; padding: 12px 15px; font-size: 16px; outline: none; }
        .send-btn { background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 16px; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: var(--secondary); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
        .nav-item.active { color: var(--accent); }
        
        .card { background: var(--surface); padding: 25px; border-radius: 20px; margin: 15px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo-text">GMONE</span>
        <button onclick="clearChat()" style="background:none; border:none; color:var(--secondary);">CLEAR</button>
    </div>

    <div id="chat-screen" class="screen active">
        <div class="chat-area" id="chat"></div>
        <div style="height: 100px;"></div> <!-- Отступ для скролла -->
    </div>

    <div id="about-screen" class="screen">
        <div class="card">
            <h2>GmOne</h2>
            <p>Версия 0.6</p>
            <div class="dev-badge" style="background: var(--accent); color: white; display: inline-block; padding: 5px 15px; border-radius: 10px;">PRO MODE</div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Введите запрос..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('chat-screen', this)">Чат</div>
        <div class="nav-item" onclick="switchTab('about-screen', this)">О нас</div>
    </div>

    <script>
        const BOT_LOGO_URL = "logo.png";
        
        // --- КОГНИТИВНЫЙ ДВИЖОК ---
        const GmOneMind = {
            memory: { lastEntity: null },
            
            async process(input) {
                let msg = input.toLowerCase().trim();
                
                // Эмоциональный блок
                if (/(привет|старт|хай)/.test(msg)) return "Системы активированы. Я готов к анализу. Какой вопрос?";
                
                // Контекстный блок (Память)
                if (/(он|она|ему|ней|его|её)/.test(msg) && this.memory.lastEntity) {
                    msg = msg.replace(/(он|она|ему|ней|его|её)/g, this.memory.lastEntity);
                }

                // Интеллектуальный роутер
                if (/(кто такой|что такое|расскажи про|инфо)\s+(.+)/.test(msg)) {
                    let q = msg.match(/(кто такой|что такое|расскажи про|инфо)\s+(.+)/)[2];
                    this.memory.lastEntity = q;
                    return await this.wiki(q);
                }

                if (msg.includes("погода")) return await this.weather(msg.split("погода").pop().trim() || "Москва");
                
                if (/[\d+*/-]{3,}/.test(msg)) {
                    try { return "🧮 " + eval(msg.replace(/[^0-9+\-*/().]/g, '')); } catch { return "Ошибка вычисления"; }
                }

                return "Запрос принят. Однако, я не нашел прямого соответствия в базе данных. Попробуй переформулировать или задать другой вопрос.";
            },

            async wiki(q) {
                try {
                    let d = await (await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`)).json();
                    return d.extract ? `**${d.title}**\n\n${d.extract}` : null;
                } catch { return null; }
            },

            async weather(c) {
                try {
                    let g = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${c}&count=1`)).json();
                    let w = (await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.results[0].latitude}&longitude=${g.results[0].longitude}&current_weather=true`)).json()).current_weather;
                    return `🌤 Погода в **${g.results[0].name}**: ${w.temperature}°C, ветер ${w.windspeed} км/ч.`;
                } catch { return "Ошибка получения погоды."; }
            }
        };

        // --- UI ---
        async function sendMessage() {
            let input = document.getElementById('userInput');
            if(!input.value) return;
            let val = input.value;
            input.value = '';
            
            appendMsg(val, 'user');
            let res = await GmOneMind.process(val);
            appendMsg(res, 'bot');
        }

        function appendMsg(text, sender) {
            let chat = document.getElementById('chat');
            let div = document.createElement('div');
            div.className = `msg-wrap ${sender}`;
            div.innerHTML = `<div class="avatar"><img class="bot-img" src="${BOT_LOGO_URL}" onerror="this.style.display='none'"></div><div class="msg ${sender}">${marked.parse(text)}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function clearChat() { location.reload(); }
        function handleKeyPress(e) { if(e.key==='Enter') sendMessage(); }
    </script>
</body>
</html>
