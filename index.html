<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GmOne</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --text: #1e293b;
            --accent: #2563eb; --bubble-bot: #f1f5f9; --bubble-user: #2563eb;
            --border: #e2e8f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a; --surface: #121212; --text: #f8fafc;
                --bubble-bot: #1c1c1e; --border: #2c2c2e;
            }
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); margin: 0;
            height: 100dvh; overflow: hidden; display: flex; flex-direction: column;
        }
        .header { background: var(--surface); padding: env(safe-area-inset-top,12px) 16px 10px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
        .logo { font-size:21px; color:var(--accent); font-weight:800; display:flex; align-items:center; gap:7px; }
        .screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
        .screen.active { display:flex; }
        .chat-area { flex:1; overflow-y:auto; padding:20px 16px 140px; display:flex; flex-direction:column; gap:18px; }
        .msg-wrap { display:flex; gap:12px; animation:messageIn 0.4s ease; max-width:85%; }
        .msg-wrap.user { margin-left:auto; flex-direction:row-reverse; }
        .avatar { width:36px; height:36px; border-radius:11px; overflow:hidden; flex-shrink:0; }
        .msg { padding:14px 17px; border-radius:18px; font-size:15.4px; line-height:1.5; }
        .msg.bot { background:var(--bubble-bot); border:1px solid var(--border); border-bottom-left-radius:6px; }
        .msg.user { background:var(--bubble-user); color:#fff; border-bottom-right-radius:6px; }
        .input-area {
            position:fixed; bottom:70px; left:0; right:0; padding:12px 16px;
            background:var(--bg); border-top:1px solid var(--border);
            display:flex; gap:10px; align-items:end; z-index:95;
        }
        input { flex:1; padding:15px 18px; border-radius:16px; border:1.5px solid var(--border); background:var(--surface); font-size:16px; }
        input:focus { border-color:var(--accent); }
        .btn { width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:23px; border:none; cursor:pointer; transition:transform 0.1s; }
        .btn:active { transform: scale(0.92); }
        .send-btn { background:var(--accent); color:white; }
        .mic-btn { background:#10b981; color:white; }
        .nav-bar { position:fixed; bottom:0; left:0; right:0; height:70px; background:var(--surface); display:flex; border-top:1px solid var(--border); }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:12.5px; font-weight:600; color:#64748b; cursor:pointer; }
        .nav-item.active { color:var(--accent); }
        .thinking { font-style:italic; color:#64748b; }
        @keyframes messageIn { from {opacity:0; transform:translateY(25px);} to {opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">GmOne <span>🧠</span></div>
        <div style="display:flex;gap:14px;align-items:center;">
            <button id="tts-btn" style="background:none;border:none;font-size:26px;cursor:pointer;">🔊</button>
            <button onclick="GmOneUI.clearChat()" style="background:none;border:none;color:var(--text);font-size:14px;">Очистить</button>
        </div>
    </div>

    <div id="chat-screen" class="screen active">
        <div class="chat-area" id="chat"></div>
    </div>

    <div id="about-screen" class="screen">
        <div style="padding:30px 20px; max-width:560px; margin:0 auto;">
            <div style="background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:32px 24px; text-align:center;">
                <div style="width:96px;height:96px;margin:0 auto 20px;border-radius:20px;overflow:hidden;">
                    <img src="logo.png" style="width:100%;height:100%;object-fit:cover;">
                </div>
                <h2>GmOne</h2>
                <p style="color:var(--accent); margin:8px 0 24px;">v1</p>
                
                <div style="text-align:left; font-size:14.8px; line-height:1.75;">
                    <strong>Разработка:</strong> Tegcompany<br>
                    <strong>Автор:</strong> Артём Юркевич<br><br>
                    <strong>Особенности:</strong><br>
                    • Встроенная векторная база знаний<br>
                    • Поиск по смыслу (не только по ключевым словам)<br>
                    • Поддержка контекста и Википедии<br>
                    • Человеческий стиль общения<br><br>
                    <strong>StartSmart</strong>
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Спроси меня о чём угодно..." autocomplete="off">
        <button class="btn mic-btn" id="mic-btn">🎤</button>
        <button class="btn send-btn" id="send-btn">➤</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" data-tab="chat-screen">Чат</div>
        <div class="nav-item" data-tab="about-screen">О проекте</div>
    </div>

    <script>
        // ====================== УЛУЧШЕННАЯ ВЕКТОРНАЯ БАЗА ======================
        class VectorDB {
            constructor() {
                this.knowledge = [];
            }

            add(text, metadata = {}) {
                const vector = this.createImprovedVector(text);
                this.knowledge.push({ text, vector, metadata });
            }

            createImprovedVector(text) {
                const words = text.toLowerCase().match(/\w+/g) || [];
                const vector = {};
                const importantWords = new Set(['искусственный', 'интеллект', 'вектор', 'база', 'знаний', 'любовь', 'смысл', 'жизнь']);

                words.forEach(word => {
                    if (word.length > 2) {
                        vector[word] = (vector[word] || 0) + (importantWords.has(word) ? 2.5 : 1);
                    }
                });
                return vector;
            }

            cosineSimilarity(vec1, vec2) {
                let dot = 0, norm1 = 0, norm2 = 0;
                for (let key in vec1) {
                    dot += (vec1[key] || 0) * (vec2[key] || 0);
                    norm1 += (vec1[key] || 0) ** 2;
                }
                for (let key in vec2) norm2 += (vec2[key] || 0) ** 2;
                return dot / (Math.sqrt(norm1) * Math.sqrt(norm2) + 0.0001);
            }

            search(query, topK = 3) {
                const qVector = this.createImprovedVector(query);
                return this.knowledge
                    .map(item => ({ ...item, similarity: this.cosineSimilarity(qVector, item.vector) }))
                    .sort((a, b) => b.similarity - a.similarity)
                    .slice(0, topK);
            }
        }

        // ====================== ОСНОВНОЙ ДВИЖОК ======================
        const GmOne = {
            db: new VectorDB(),
            history: [],
            ttsEnabled: true,

            initKnowledge() {
                const baseKnowledge = [
                    "Искусственный интеллект — это системы, способные выполнять задачи, требующие человеческого разума.",
                    "Векторная база данных позволяет искать информацию по смыслу, а не только по ключевым словам.",
                    "GmOne — это личный помощник от Tegcompany, использующий векторный поиск.",
                    "Любовь — это желание счастья другому человеку.",
                    "Смысл жизни каждый определяет сам. Часто он заключается в росте, любви и помощи другим.",
                    "Программирование учит думать логически и превращать идеи в реальность.",
                    "Минск — столица Беларуси, красивый и зелёный город.",
                    "Tegcompany — компания, занимающаяся разработкой современных цифровых решений."
                ];
                baseKnowledge.forEach(text => this.db.add(text));
            },

            async think(input) {
                this.history.push({ role: "user", content: input });
                const results = this.db.search(input, 3);
                const best = results[0];

                if (best && best.similarity > 0.18) {
                    return best.text + "\n\n(найдено по смыслу в базе знаний)";
                }

                if (/(кто такой|кто такая|что такое|расскажи про|инфа о)/.test(input.toLowerCase())) {
                    return await this.fetchWikipedia(input);
                }

                return this.generateSmartResponse(input);
            },

            generateSmartResponse(input) {
                const lower = input.toLowerCase();
                if (lower.includes("привет") || lower.includes("здравствуй")) 
                    return "Привет! 👋 Я GmOne с векторным поиском. Чем могу помочь?";
                if (lower.includes("как дела") || lower.includes("как ты")) 
                    return "Спасибо, хорошо! Постоянно учусь и улучшаюсь благодаря нашим разговорам.";
                return `Хороший вопрос: "${input}".\n\nЯ поискал в своей векторной базе, но давай разберём подробнее — что именно тебя интересует?`;
            },

            async fetchWikipedia(text) {
                try {
                    const match = text.match(/(?:кто такой|кто такая|что такое|расскажи про)\s+(.+?)(?:\?|$)/i);
                    const q = match ? match[1].trim() : text;
                    const res = await fetch(`https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                    const data = await res.json();
                    return data.extract ? `**${data.title}**\n\n${data.extract.substring(0, 450)}...` : "Не нашёл точной информации.";
                } catch {
                    return "Не удалось подключиться к Википедии.";
                }
            }
        };

        // ====================== UI ======================
        const GmOneUI = {
            chat: null,
            input: null,

            init() {
                this.chat = document.getElementById('chat');
                this.input = document.getElementById('userInput');
                GmOne.initKnowledge();
                this.renderHistory();
                this.setupListeners();
            },

            setupListeners() {
                document.getElementById('send-btn').onclick = () => this.send();
                this.input.onkeypress = e => e.key === 'Enter' && this.send();
                document.querySelectorAll('.nav-item').forEach(el => el.onclick = () => this.switchTab(el));
                document.getElementById('tts-btn').onclick = () => this.toggleTTS();
                document.getElementById('mic-btn').onclick = () => this.startVoice();
            },

            async send() {
                const text = this.input.value.trim();
                if (!text) return;

                this.appendMessage(text, 'user');
                this.input.value = '';

                const thinking = this.showThinking();
                const response = await GmOne.think(text);
                thinking.remove();

                this.appendMessage(response, 'bot');
                this.speak(response);
            },

            appendMessage(text, role) {
                const wrap = document.createElement('div');
                wrap.className = `msg-wrap ${role}`;
                const isBot = role === 'bot';
                wrap.innerHTML = isBot 
                    ? `<div class="avatar"><img src="logo.png"></div><div class="msg bot">${marked.parse(text)}</div>`
                    : `<div style="width:36px;height:36px;background:#64748b;color:white;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;">👤</div><div class="msg user">${marked.parse(text)}</div>`;
                this.chat.appendChild(wrap);
                this.chat.scrollTo({ top: this.chat.scrollHeight, behavior: 'smooth' });
            },

            showThinking() {
                const wrap = document.createElement('div');
                wrap.className = 'msg-wrap';
                wrap.innerHTML = `<div class="avatar"><img src="logo.png"></div><div class="msg bot thinking">🧠 Ищу по векторам...</div>`;
                this.chat.appendChild(wrap);
                this.chat.scrollTo({ top: this.chat.scrollHeight, behavior: 'smooth' });
                return wrap;
            },

            renderHistory() {
                this.chat.innerHTML = '';
                GmOne.history.forEach(m => this.appendMessage(m.content, m.role));
            },

            switchTab(el) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.getElementById(el.dataset.tab).classList.add('active');
                el.classList.add('active');
            },

            toggleTTS() {
                GmOne.ttsEnabled = !GmOne.ttsEnabled;
                localStorage.setItem('gmone_tts', GmOne.ttsEnabled);
                document.getElementById('tts-btn').textContent = GmOne.ttsEnabled ? '🔊' : '🔇';
            },

            speak(text) {
                if (!GmOne.ttsEnabled || !speechSynthesis) return;
                const u = new SpeechSynthesisUtterance(text.replace(/\*\*.*?\*\*/g, ''));
                u.lang = 'ru-RU';
                speechSynthesis.speak(u);
            },

            startVoice() {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) return alert("Голосовой ввод не поддерживается");
                const rec = new SR();
                rec.lang = 'ru-RU';
                rec.onresult = e => {
                    this.input.value = e.results[0][0].transcript;
                    this.send();
                };
                rec.start();
            },

            clearChat() {
                if (confirm("Очистить весь чат?")) {
                    GmOne.history = [];
                    this.chat.innerHTML = '';
                }
            }
        };

        window.onload = () => {
            if (Telegram?.WebApp) Telegram.WebApp.expand();
            GmOneUI.init();

            if (GmOne.history.length === 0) {
                setTimeout(() => {
                    GmOneUI.appendMessage("Привет! Я GmOne.\n\nСпрашивай что угодно.", "bot");
                }, 400);
            }
        };

        window.GmOneUI = GmOneUI;
    </script>
</body>
</html>
